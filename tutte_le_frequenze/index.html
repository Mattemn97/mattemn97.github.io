<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Frequency Monitor</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="w3-light-grey">

<div class="w3-row">

    <nav class="w3-sidebar w3-bar-block w3-collapse w3-animate-left w3-card" style="width:20%; background-color:#1a252f; color:#fff; z-index:3;" id="mySidebar">
        <div class="w3-container w3-padding-16 w3-dark-grey">
            <h4 class="w3-margin-0"><i class="fa-solid fa-radio w3-margin-right"></i>RF Database</h4>
        </div>
        <div id="menu-voci">
            <div class="w3-padding w3-text-grey"><i class="fa fa-spinner fa-spin"></i> Caricamento moduli...</div>
        </div>
    </nav>

    <div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" style="cursor:pointer" id="myOverlay"></div>

    <div class="w3-main" style="margin-left:20%;">

        <header class="w3-container w3-hide-large w3-black w3-xlarge w3-padding">
            <a href="javascript:void(0)" class="w3-button w3-black w3-margin-right" onclick="w3_open()"><i class="fa fa-bars"></i></a>
            <span>RF Database</span>
        </header>

        <div class="w3-container w3-padding-16">
            
            <div class="w3-card w3-white w3-padding w3-round w3-margin-bottom">
                <h2 id="titolo-sezione" class="w3-text-blue-grey w3-margin-0">Seleziona una categoria</h2>
                <p id="info-sezione" class="w3-text-grey w3-small w3-margin-0">Scegli un ambito dal menu laterale per iniziare.</p>
                
                <div class="w3-row w3-margin-top">
                    <div class="w3-col s12">
                        <div class="w3-row w3-border w3-round w3-light-grey" style="display: flex; align-items: center;">
                            <div class="w3-container w3-text-grey"><i class="fa-solid fa-magnifying-glass"></i></div>
                            <input type="text" id="inputRicerca" class="w3-input w3-border-0 w3-transparent" style="outline: none; width: 100%;" placeholder="Filtra istantaneamente per provincia, località o frequenza..." onkeyup="filtraTabella()" disabled>
                        </div>
                    </div>
                </div>
            </div>

            <div id="contenuto-dati">
                </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
