<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Situation Awareness - Telemetry Terminal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="telemetry-terminal">
        <header id="global-controls">
            <div class="sys-title">F1_SYS_AWARENESS_V2 // TERMINAL</div>
            <div class="selectors">
                <label for="select-anno">YR:</label>
                <select id="select-anno"></select>
                
                <label for="select-gp">GP:</label>
                <select id="select-gp"></select>
            </div>
            <div class="actions">
                <button id="btn-stampa" class="btn-action">[PRINT_DATA]</button>
            </div>
        </header>

        <nav id="system-tabs">
            <button class="tab-link active" data-target="tab-classifica">CLASSIFICA</button>
            <button class="tab-link" data-target="tab-pl">RISULTATI_PROVE_LIBERE</button>
            <button class="tab-link" data-target="tab-quali">RISULTATI_QUALIFICHE</button>
            <button class="tab-link" data-target="tab-gara">RISULTATI_GARE</button>
            <button class="tab-link" data-target="tab-analisi-quali">ANALISI_QUALIFICHE</button>
            <button class="tab-link" data-target="tab-analisi-passo">PASSO_GARE</button>
            <button class="tab-link" data-target="tab-confronto-quali">CONFRONTO_QUALIFICHE</button>
            <button class="tab-link" data-target="tab-confronto-gare">CONFRONTO_GARE</button>
            <button class="tab-link" data-target="tab-riassunto">RIASSUNTO_WEEKEND_PILOTA</button>
        </nav>

        <main id="tab-container">
            <div id="tab-classifica" class="tab-content active">Awaiting Data...</div>
            <div id="tab-pl" class="tab-content">Awaiting Data...</div>
            <div id="tab-quali" class="tab-content">Awaiting Data...</div>
            <div id="tab-gara" class="tab-content">Awaiting Data...</div>
            <div id="tab-analisi-quali" class="tab-content">Awaiting Data...</div>
            <div id="tab-analisi-passo" class="tab-content">Awaiting Data...</div>
            <div id="tab-confronto-quali" class="tab-content">Awaiting Data...</div>
            <div id="tab-confronto-gare" class="tab-content">Awaiting Data...</div>
            <div id="tab-riassunto" class="tab-content">Awaiting Data...</div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/elaborazione_dati.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/print_service.js"></script>

    <script src="js/tabs/Classifica.js"></script>
    <script src="js/tabs/RisultatiPL.js"></script>
    <script src="js/tabs/RisultatiQualifiche.js"></script>
    <script src="js/tabs/RisultatiGare.js"></script>
    <script src="js/tabs/AnalisiQualifiche.js"></script>
    <script src="js/tabs/AnalisiPassoGara.js"></script>
    <script src="js/tabs/ConfrontoQualifiche.js"></script>
    <script src="js/tabs/ConfrontoGare.js"></script>
    <script src="js/tabs/RiassuntoPilota.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
